name: Reusable Agentic Ready Transformer (Gitea)

on:
  workflow_call:
    inputs:
      target_branch:
        description: 'Base branch to create PR against'
        required: false
        default: 'main'
        type: string
      only:
        description: 'Pass to --only flag (agents|tools|context|memory), empty = all'
        required: false
        default: ''
        type: string
      force:
        description: 'Pass --force to overwrite existing files'
        required: false
        default: false
        type: boolean

env:
  TOOLKIT_REPO: vb-nattamai/agent-ready
  TOOLKIT_VERSION: main

jobs:
  transform:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout caller repository
        uses: gitea.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout toolkit repository
        run: |
          git clone -b ${{ env.TOOLKIT_VERSION }} --depth 1 \
            ${{ gitea.server }}/{{ env.TOOLKIT_REPO }} .agentic-toolkit

      - name: Set up Python 3.11
        uses: gitea.com/actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f .agentic-toolkit/requirements.txt ]; then
            pip install -q anthropic || echo "⚠️  anthropic not available, using static mode"
          fi

      - name: Configure git
        run: |
          git config --local user.email "agentic-ready@gitea.local"
          git config --local user.name "Agentic Ready Bot"

      - name: Run transformer
        id: transform
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cd "$(pwd)"
          
          CMD="python .agentic-toolkit/scripts/run_transformer.py --target ."
          [ -n "${{ inputs.only }}" ] && CMD="$CMD --only ${{ inputs.only }}"
          [ "${{ inputs.force }}" = "true" ] && CMD="$CMD --force"
          
          echo "Running: $CMD"
          echo ""
          
          $CMD || exit 1
          
          if git diff --quiet; then
            echo "generated=false" >> $GITHUB_OUTPUT
            echo "✅ Already up to date"
          else
            echo "generated=true" >> $GITHUB_OUTPUT
            echo "✅ Files generated"
          fi

      - name: Create branch and commit (if files generated)
        if: steps.transform.outputs.generated == 'true'
        run: |
          BRANCH_NAME="agentic-ready/init"
          
          if git ls-remote --heads origin $BRANCH_NAME | grep -q $BRANCH_NAME; then
            BRANCH_NAME="agentic-ready/update"
          fi
          
          git checkout -b $BRANCH_NAME
          git add -A
          git commit -m "feat: add agentic-ready scaffolding [skip ci]"
          git push origin $BRANCH_NAME
          
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create Pull Request via Gitea API
        if: steps.transform.outputs.generated == 'true'
        id: pr
        run: |
          BRANCH_NAME=${{ env.BRANCH_NAME }}
          BASE_BRANCH="${{ inputs.target_branch }}"
          REPO_FULLNAME="${{ gitea.repository }}"
          API_BASE="${{ gitea.server }}/api/v1"
          
          # Prepare PR body from template
          PR_BODY="Generated by [AgentReady](${{ gitea.server }}/${{ env.TOOLKIT_REPO }})"
          if [ -f .agentic-toolkit/.github/PR_TEMPLATE.md ]; then
            PR_BODY=$(cat .agentic-toolkit/.github/PR_TEMPLATE.md)
          fi
          
          # Create label if needed
          curl -s -X POST "$API_BASE/repos/$REPO_FULLNAME/labels" \
            -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "agentic-ready",
              "color": "4CAF50",
              "description": "Agentic ready scaffolding"
            }' 2>/dev/null || true
          
          # Check if PR exists
          PR_RESPONSE=$(curl -s -X GET \
            "$API_BASE/repos/$REPO_FULLNAME/pulls?state=open&labels=agentic-ready" \
            -H "Authorization: token ${{ secrets.GITEA_TOKEN }}")
          
          # Create PR
          PR_RESPONSE=$(curl -s -X POST "$API_BASE/repos/$REPO_FULLNAME/pulls" \
            -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"🤖 Add agentic-ready scaffolding\",
              \"body\": $(echo "$PR_BODY" | jq -Rs .),
              \"head\": \"$BRANCH_NAME\",
              \"base\": \"$BASE_BRANCH\",
              \"labels\": [\"agentic-ready\"]
            }")
          
          PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number // empty')
          
          if [ -z "$PR_NUMBER" ]; then
            echo "⚠️  PR might already exist or error occurred"
            echo "$PR_RESPONSE" | jq .
            exit 1
          fi
          
          PR_URL="${{ gitea.server }}/$REPO_FULLNAME/pulls/$PR_NUMBER"
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "✅ Pull Request created: $PR_URL"
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

      - name: Post success
        if: steps.transform.outputs.generated == 'true'
        run: |
          echo "✅ Transformation Complete"
          echo "PR: ${{ steps.pr.outputs.pr_url }}"
