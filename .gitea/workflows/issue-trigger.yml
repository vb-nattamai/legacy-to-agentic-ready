name: Agentic Ready - Issue Trigger (Gitea)

on:
  issues:
    types: [opened, labeled]

env:
  TOOLKIT_REPO: vb-nattamai/agent-ready
  TOOLKIT_VERSION: main

jobs:
  transform:
    if: |
      contains(github.event.issue.title, '[agentic-ready]') ||
      contains(github.event.issue.labels.*.name, 'agentic-ready')
    runs-on: ubuntu-latest
    
    steps:
      - name: Check actor is a repo collaborator
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          PERM=$(curl -s -H "Authorization: token $GITEA_TOKEN" \
            "${{ gitea.server }}/api/v1/repos/${{ gitea.repository }}/collaborators/${{ gitea.actor }}" \
            -o /dev/null -w "%{http_code}")
          if [ "$PERM" != "204" ]; then
            echo "Actor ${{ gitea.actor }} is not a collaborator. Skipping."
            exit 1
          fi

      - name: Checkout repository
        uses: gitea.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout toolkit
        run: |
          git clone -b ${{ env.TOOLKIT_VERSION }} --depth 1 \
            ${{ gitea.server }}/{{ env.TOOLKIT_REPO }} .agentic-toolkit

      - name: Set up Python 3.11
        uses: gitea.com/actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f .agentic-toolkit/requirements.txt ]; then
            pip install -q anthropic || echo "⚠️  anthropic not available, using static mode"
          fi

      - name: Configure git
        run: |
          git config --local user.email "agentic-ready@gitea.local"
          git config --local user.name "Agentic Ready Bot"

      - name: Run transformer
        id: transform
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cd "$(pwd)"
          
          python .agentic-toolkit/scripts/run_transformer.py --target . || exit 1
          
          if git diff --quiet; then
            echo "generated=false" >> $GITHUB_OUTPUT
          else
            echo "generated=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and commit
        if: steps.transform.outputs.generated == 'true'
        id: branch
        run: |
          BRANCH_NAME="agentic-ready/init"
          
          if git ls-remote --heads origin $BRANCH_NAME | grep -q $BRANCH_NAME; then
            BRANCH_NAME="agentic-ready/update"
          fi
          
          git checkout -b $BRANCH_NAME
          git add -A
          git commit -m "feat: add agentic-ready scaffolding [skip ci]"
          git push origin $BRANCH_NAME
          
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create Pull Request via Gitea API
        if: steps.transform.outputs.generated == 'true'
        id: pr
        run: |
          BRANCH_NAME=${{ steps.branch.outputs.branch_name }}
          REPO_FULLNAME="${{ gitea.repository }}"
          API_BASE="${{ gitea.server }}/api/v1"
          ISSUE_NUMBER=${{ github.event.issue.number }}
          
          # Prepare PR body from template
          PR_BODY="Generated by [AgentReady](${{ gitea.server }}/${{ env.TOOLKIT_REPO }})"
          if [ -f .agentic-toolkit/.github/PR_TEMPLATE.md ]; then
            PR_BODY=$(cat .agentic-toolkit/.github/PR_TEMPLATE.md)
          fi
          
          # Create label if needed (ignore errors)
          curl -s -X POST "$API_BASE/repos/$REPO_FULLNAME/labels" \
            -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "agentic-ready",
              "color": "4CAF50",
              "description": "Agentic ready scaffolding"
            }' 2>/dev/null || true
          
          # Create PR
          PR_RESPONSE=$(curl -s -X POST "$API_BASE/repos/$REPO_FULLNAME/pulls" \
            -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"🤖 Add agentic-ready scaffolding\",
              \"body\": $(echo "$PR_BODY" | jq -Rs .),
              \"head\": \"$BRANCH_NAME\",
              \"base\": \"${{ gitea.ref_name }}\",
              \"labels\": [\"agentic-ready\"]
            }")
          
          PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number // empty')
          
          if [ -z "$PR_NUMBER" ]; then
            echo "⚠️  Error creating PR"
            echo "$PR_RESPONSE" | jq .
            exit 1
          fi
          
          PR_URL="${{ gitea.server }}/$REPO_FULLNAME/pulls/$PR_NUMBER"
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Comment on issue
        if: steps.transform.outputs.generated == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          REPO_FULLNAME="${{ gitea.repository }}"
          API_BASE="${{ gitea.server }}/api/v1"
          ISSUE_NUMBER=${{ github.event.issue.number }}
          PR_URL="${{ steps.pr.outputs.pr_url }}"
          
          COMMENT_TEXT=$(cat <<'EOF'
🤖 **Agentic Ready Transformation Started**

I've analysed this repository and generated all AI agent scaffolding files.

**Pull Request:** ${{ steps.pr.outputs.pr_url }}

**What was generated:**
- 📝 **CLAUDE.md** — Claude Code context
- 📋 **AGENTS.md** — Agent contract
- 📊 **agent-context.json** — Machine-readable repo map
- 💬 **agents/system_prompt.md** — Universal LLM system prompt
- 🔗 **mcp.json** — MCP server config
- 🛠️  **tools/** — Tool scaffolds for detected language(s)
- 📚 **memory/schema.md** — Memory schema

Review the PR, adjust any placeholder values, and merge when ready.
EOF
          )
          
          curl -s -X POST "$API_BASE/repos/$REPO_FULLNAME/issues/$ISSUE_NUMBER/comments" \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"body\": $(echo "$COMMENT_TEXT" | jq -Rs .)
            }" | jq .

      - name: Add success label
        if: steps.transform.outputs.generated == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          REPO_FULLNAME="${{ gitea.repository }}"
          API_BASE="${{ gitea.server }}/api/v1"
          ISSUE_NUMBER=${{ github.event.issue.number }}
          
          # Create success label
          curl -s -X POST "$API_BASE/repos/$REPO_FULLNAME/labels" \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "agentic-ready-complete",
              "color": "00BCD4",
              "description": "Agentic ready transformation complete"
            }' 2>/dev/null || true
          
          # Add label to issue
          curl -s -X POST "$API_BASE/repos/$REPO_FULLNAME/issues/$ISSUE_NUMBER/labels" \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"labels": ["agentic-ready-complete"]}' | jq .

      - name: Handle failure
        if: failure() && steps.transform.outputs.generated != 'false'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          REPO_FULLNAME="${{ gitea.repository }}"
          API_BASE="${{ gitea.server }}/api/v1"
          ISSUE_NUMBER=${{ github.event.issue.number }}
          WORKFLOW_URL="${{ gitea.server }}/$REPO_FULLNAME/actions/runs/${{ github.run_id }}"
          
          # Create failure label
          curl -s -X POST "$API_BASE/repos/$REPO_FULLNAME/labels" \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "agentic-ready-failed",
              "color": "f44336",
              "description": "Agentic ready transformation failed"
            }' 2>/dev/null || true
          
          # Comment on issue
          FAILURE_TEXT=$(cat <<'EOF'
❌ **Agentic Ready Transformation Failed**

The transformer encountered an error. Please check the [workflow run](${{ gitea.server }}/${{ gitea.repository }}/actions/runs/${{ github.run_id }}) for details.
EOF
          )
          
          curl -s -X POST "$API_BASE/repos/$REPO_FULLNAME/issues/$ISSUE_NUMBER/comments" \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"body\": $(echo "$FAILURE_TEXT" | jq -Rs .)
            }" | jq .
          
          # Add failure label
          curl -s -X POST "$API_BASE/repos/$REPO_FULLNAME/issues/$ISSUE_NUMBER/labels" \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"labels": ["agentic-ready-failed"]}' | jq .
