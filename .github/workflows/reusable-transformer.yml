name: Reusable Agentic Ready Transformer

on:
  workflow_call:
    inputs:
      target_branch:
        description: 'Base branch to create PR against'
        required: false
        default: 'main'
        type: string
      only:
        description: 'Pass to --only flag (agents|tools|context|memory), empty = all'
        required: false
        default: ''
        type: string
      force:
        description: 'Pass --force to overwrite existing files'
        required: false
        default: false
        type: boolean
      issue_number:
        description: 'Issue number that triggered this run (for auto-close)'
        required: false
        default: ''
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Optional Anthropic API key for LLM-enhanced generation'
        required: false
      OPENAI_API_KEY:
        description: 'Optional OpenAI API key'
        required: false
      GOOGLE_API_KEY:
        description: 'Optional Google API key'
        required: false

jobs:
  transform:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout toolkit repository
        uses: actions/checkout@v4
        with:
          repository: vb-nattamai/agent-ready
          path: .agentic-toolkit
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          # Ensure packaging toolchain is up-to-date for editable installs
          python -m pip install --upgrade setuptools wheel build

          if [ -f .agentic-toolkit/requirements.txt ]; then
            python -m pip install -r .agentic-toolkit/requirements.txt || echo "⚠️  could not install optional requirements, continuing"
          fi

          # Install agent-ready so the shim can import it
          # Use a non-editable install to avoid editable/pyproject backend issues in CI
          cd .agentic-toolkit
          python -m pip install --upgrade setuptools wheel
          python -m pip install . -q
          cd ..

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Run transformer
        id: transform
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cd "$(pwd)"
          
          # Build command
          CMD="python .agentic-toolkit/scripts/run_transformer.py --target ."
          [ -n "${{ inputs.only }}" ] && CMD="$CMD --only ${{ inputs.only }}"
          [ "${{ inputs.force }}" = "true" ] && CMD="$CMD --force"
          
          echo "Running: $CMD"
          echo ""
          
          $CMD
          
          # Check if files were generated (covers new untracked files too)
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "generated=false" >> $GITHUB_OUTPUT
            echo "✅ Already up to date"
          else
            echo "generated=true" >> $GITHUB_OUTPUT
            echo "✅ Files generated"
          fi

      - name: Create branch and commit (if files generated)
        if: steps.transform.outputs.generated == 'true'
        run: |
          BRANCH_NAME="agentic-ready/init"
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            BRANCH_NAME="agentic-ready/update-$(date +%Y%m%d-%H%M%S)"
          fi
          git checkout -b "$BRANCH_NAME"
          echo ".agentic-toolkit" >> .git/info/exclude
          git add -A
          git commit -m "feat: add agentic-ready scaffolding [skip ci]"
          git push origin "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create Pull Request
        if: steps.transform.outputs.generated == 'true'
        id: pr
        run: |
          BRANCH_NAME="${{ env.BRANCH_NAME }}"
          gh label create agentic-ready --color "4CAF50" --description "Agentic ready scaffolding" 2>/dev/null || true
          if [ -f .agentic-toolkit/.github/PR_TEMPLATE.md ]; then
            PR_URL=$(gh pr create \
              --title "🤖 Add agentic-ready scaffolding" \
              --body-file .agentic-toolkit/.github/PR_TEMPLATE.md \
              --base "${{ inputs.target_branch }}" \
              --head "$BRANCH_NAME" \
              --label agentic-ready)
          else
            PR_URL=$(gh pr create \
              --title "🤖 Add agentic-ready scaffolding" \
              --body "Generated by [AgentReady](https://github.com/vb-nattamai/agent-ready)" \
              --base "${{ inputs.target_branch }}" \
              --head "$BRANCH_NAME" \
              --label agentic-ready)
          fi
          
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "Pull Request created: $PR_URL"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Post success
        if: steps.transform.outputs.generated == 'true'
        run: |
          echo "✅ Transformation Complete"
          echo "PR: ${{ steps.pr.outputs.pr_url }}"

      - name: Close triggering issue
        if: inputs.issue_number != ''
        run: |
          PR_URL="${{ steps.pr.outputs.pr_url }}"
          ISSUE="${{ inputs.issue_number }}"
          if [ -n "$PR_URL" ]; then
            gh issue comment "$ISSUE" --body "✅ Transformation complete! PR opened: $PR_URL\n\nReview and merge to add the agentic scaffolding to this repo."
          else
            gh issue comment "$ISSUE" --body "ℹ️ Repository is already up to date — no new files to generate."
          fi
          gh issue close "$ISSUE" --reason completed
        env:
          GH_TOKEN: ${{ github.token }}
