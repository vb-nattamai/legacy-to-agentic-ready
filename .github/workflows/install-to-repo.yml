name: Agentic Ready - Trigger Dispatcher

on:
  issues:
    types: [opened, labeled]

jobs:
  check-permission:
    if: |
      contains(github.event.issue.title, '[agentic-ready]') ||
      contains(github.event.issue.labels.*.name, 'agentic-ready')
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check actor is a repo collaborator
        id: check
        uses: actions/github-script@v6
        with:
          script: |
            try {
              await github.rest.repos.checkCollaborator({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.actor,
              });
              core.setOutput('allowed', 'true');
              console.log(`✅ ${context.actor} is a collaborator — allowing transformation.`);
            } catch {
              core.setOutput('allowed', 'false');
              console.log(`❌ ${context.actor} is not a collaborator — blocking transformation.`);
            }

  transform:
    needs: check-permission
    if: needs.check-permission.outputs.allowed == 'true'
    uses: vb-nattamai/agent-ready/.github/workflows/reusable-transformer.yml@main
    with:
      target_repo: ${{ github.repository }}
      target_branch: ${{ github.event.repository.default_branch }}
      issue_number: ${{ github.event.issue.number }}
      llm: false        # set to true to use LLM-first mode (requires ANTHROPIC_API_KEY secret)
      eval: false       # set to true to measure whether context files improve AI responses
      fail_level: '0.0' # set e.g. '0.8' to fail if eval pass rate < 80% (CI gate)
      force: false
      only: ''
    secrets: inherit