name: Install Agentic Ready to Repo

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (e.g., myorg/my-app)'
        required: true
        type: string
      target_branch:
        description: 'Branch to commit to'
        required: false
        default: 'main'
        type: string

jobs:
  install:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Validate inputs
        run: |
          if [[ ! "${{ inputs.target_repo }}" =~ ^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$ ]]; then
            echo "❌ Invalid repo format. Use: owner/repo"
            exit 1
          fi
          echo "✅ Installing to: ${{ inputs.target_repo }}@${{ inputs.target_branch }}"

      - name: Checkout toolkit (for workflow template)
        uses: actions/checkout@v4
        with:
          path: toolkit

      - name: Create issue-trigger workflow in target repo
        env:
          GH_TOKEN: ${{ secrets.INSTALL_TOKEN || github.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          CONTENT=$(base64 -i toolkit/templates/install-workflow.yml | tr -d '\n')

          # Get SHA if file already exists (empty string if not found or null)
          SHA=$(gh api "repos/$TARGET_REPO/contents/.github%2Fworkflows%2Fagentic-ready.yml" \
            --jq '.sha // empty' 2>/dev/null || true)

          if [ -n "$SHA" ]; then
            echo "ℹ️  Workflow already exists, updating..."
            gh api "repos/$TARGET_REPO/contents/.github%2Fworkflows%2Fagentic-ready.yml" \
              -X PUT \
              -f "message=chore: update agentic-ready workflow" \
              -f "content=$CONTENT" \
              -f "sha=$SHA" \
              -f "branch=$TARGET_BRANCH" > /dev/null
          else
            echo "📝 Creating new workflow..."
            gh api "repos/$TARGET_REPO/contents/.github%2Fworkflows%2Fagentic-ready.yml" \
              -X PUT \
              -f "message=feat: add agentic-ready automation workflow" \
              -f "content=$CONTENT" \
              -f "branch=$TARGET_BRANCH" > /dev/null
          fi

      - name: Report result
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          echo "✅ Installation complete!"
          echo ""
          echo "Next steps:"
          echo "1. Go to: https://github.com/$TARGET_REPO"
          echo "2. Create an issue titled: [agentic-ready] Transform this repo"
          echo "3. The workflow will trigger automatically"
          echo ""
          echo "Commit URL:"
          echo "https://github.com/$TARGET_REPO/blob/$TARGET_BRANCH/.github/workflows/agentic-ready.yml"
