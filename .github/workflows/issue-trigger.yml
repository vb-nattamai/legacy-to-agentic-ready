name: Agentic Ready - Issue Trigger

on:
  issues:
    types: [opened, labeled]

jobs:
  transform:
    if: |
      contains(github.event.issue.title, '[agentic-ready]') ||
      contains(github.event.issue.labels.*.name, 'agentic-ready')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout toolkit
        uses: actions/checkout@v4
        with:
          repository: vb-nattamai/legacy-to-agentic-ready
          path: .agentic-toolkit
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f .agentic-toolkit/requirements.txt ]; then
            pip install -q anthropic || echo "⚠️  anthropic not available, using static mode"
          fi

      - name: Configure git
        run: |
          git config --local user.email "agentic-ready@github.com"
          git config --local user.name "Agentic Ready Bot"

      - name: Run transformer
        id: transform
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cd "$(pwd)"
          
          python .agentic-toolkit/scripts/run_transformer.py --target .
          
          if git diff --quiet; then
            echo "generated=false" >> $GITHUB_OUTPUT
          else
            echo "generated=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch and commit
        if: steps.transform.outputs.generated == 'true'
        id: branch
        run: |
          BRANCH_NAME="agentic-ready/init"
          
          if git ls-remote --heads origin $BRANCH_NAME | grep -q $BRANCH_NAME; then
            BRANCH_NAME="agentic-ready/update"
          fi
          
          git checkout -b $BRANCH_NAME
          git add -A
          git commit -m "feat: add agentic-ready scaffolding [skip ci]"
          git push origin $BRANCH_NAME
          
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.transform.outputs.generated == 'true'
        id: pr
        run: |
          BRANCH_NAME=${{ steps.branch.outputs.branch_name }}
          
          gh label create agentic-ready -c "4CAF50" -d "Agentic ready scaffolding" 2>/dev/null || true
          
          if [ -f .agentic-toolkit/.github/PR_TEMPLATE.md ]; then
            BODY_FILE=$(mktemp)
            cat .agentic-toolkit/.github/PR_TEMPLATE.md > "$BODY_FILE"
            PR_URL=$(gh pr create \
              --title "🤖 Add agentic-ready scaffolding" \
              --body-file "$BODY_FILE" \
              --base ${{ github.event.repository.default_branch }} \
              --head $BRANCH_NAME \
              --label agentic-ready)
            rm "$BODY_FILE"
          else
            PR_URL=$(gh pr create \
              --title "🤖 Add agentic-ready scaffolding" \
              --body "Generated by [legacy-to-agentic-ready](https://github.com/vb-nattamai/legacy-to-agentic-ready)" \
              --base ${{ github.event.repository.default_branch }} \
              --head $BRANCH_NAME \
              --label agentic-ready)
          fi
          
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Check actor is a repo collaborator
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            const allowed = ['admin', 'write', 'maintain'];
            if (!allowed.includes(perm.permission)) {
              core.setFailed(`@${context.actor} does not have write access. Transformation skipped.`);
            }

      - name: Comment on issue
        if: steps.transform.outputs.generated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          BODY_TEXT=$(cat <<'EOF'
🤖 **Agentic Ready Transformation Started**

I've analysed this repository and generated all AI agent scaffolding files.

**Pull Request:** ${{ steps.pr.outputs.pr_url }}

**What was generated:**
- 📝 **CLAUDE.md** — Claude Code context
- 📋 **AGENTS.md** — Agent contract
- 📊 **agent-context.json** — Machine-readable repo map
- 💬 **agents/system_prompt.md** — Universal LLM system prompt
- 🔗 **mcp.json** — MCP server config
- 🛠️  **tools/** — Tool scaffolds for detected language(s)
- 📚 **memory/schema.md** — Memory schema

Review the PR, adjust any placeholder values, and merge when ready.
EOF
          )
          gh issue comment ${{ github.event.issue.number }} --body "$BODY_TEXT"

      - name: Add success label
        if: steps.transform.outputs.generated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create agentic-ready-complete -c "00BCD4" -d "Agentic ready transformation complete" 2>/dev/null || true
          gh issue edit ${{ github.event.issue.number }} --add-label "agentic-ready-complete"

      - name: Handle transformation failure
        if: failure() && steps.transform.outputs.generated != 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create agentic-ready-failed -c "f44336" -d "Agentic ready transformation failed" 2>/dev/null || true
          FAILURE_TEXT=$(cat <<'EOF'
❌ **Agentic Ready Transformation Failed**

The transformer encountered an error. Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
EOF
          )
          gh issue comment ${{ github.event.issue.number }} --body "$FAILURE_TEXT"
          gh issue edit ${{ github.event.issue.number }} --add-label "agentic-ready-failed"
