name: Test — Agentic Ready (Dry Run)
# Manually trigger from Actions tab to preview changes before committing
# No files are written. Requires an API key to run the LLM analysis.

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target repo to preview (owner/repo). Leave as '.' to smoke-test agent-ready itself."
        required: false
        default: '.'
        type: string
      provider:
        description: 'LLM provider preset: anthropic | openai | google | groq | mistral | together | ollama'
        required: false
        default: 'anthropic'
        type: string
      verify:
        description: Verify generated context with the evaluation model
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  dry-run:
    name: Preview Agentic Transformation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agent-ready
        uses: actions/checkout@v6
        with:
          path: toolkit

      - name: Checkout target repo
        if: ${{ github.event.inputs.target_repo != '.' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.inputs.target_repo }}
          path: target
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install agent-ready with AI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e 'toolkit[ai]' -q

      - name: Run transformer in dry-run mode (no files written)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          INPUT_TARGET_REPO: ${{ github.event.inputs.target_repo }}
          INPUT_PROVIDER: ${{ github.event.inputs.provider || 'anthropic' }}
        run: |
          if [ "$INPUT_TARGET_REPO" = "." ]; then
            TARGET_PATH="toolkit"
          else
            TARGET_PATH="target"
          fi

          echo "🔍 Analyzing: $TARGET_PATH"
          echo "🤖 Provider:  $INPUT_PROVIDER"
          echo "📋 Dry-run mode — no files will be written"
          echo ""

          python -m agent_ready.cli \
            --target "$TARGET_PATH" \
            --provider "$INPUT_PROVIDER" \
            --dry-run

      - name: Run verification (optional)
        if: github.event.inputs.verify == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          INPUT_TARGET_REPO: ${{ github.event.inputs.target_repo }}
          INPUT_PROVIDER: ${{ github.event.inputs.provider || 'anthropic' }}
        run: |
          if [ "$INPUT_TARGET_REPO" = "." ]; then
            TARGET_PATH="toolkit"
          else
            TARGET_PATH="target"
          fi

          echo "✅ Verifying generated context..."
          python -m agent_ready.cli \
            --target "$TARGET_PATH" \
            --provider "$INPUT_PROVIDER" \
            --verify
        continue-on-error: true

      - name: Summary
        if: always()
        env:
          INPUT_PROVIDER: ${{ github.event.inputs.provider || 'anthropic' }}
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Dry-run Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Provider used: $INPUT_PROVIDER"
          echo "📋 Preview above shows what would be generated."
          echo ""
          echo "To run for real:"
          echo "  agent-ready --target /path/to/repo --provider $INPUT_PROVIDER"
          echo ""
