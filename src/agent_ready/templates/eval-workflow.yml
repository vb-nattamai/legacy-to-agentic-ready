name: Agentic Ready - Eval
on:
  # Run manually from the Actions tab at any time
  workflow_dispatch:
    inputs:
      fail_level:
        description: 'Fail if eval pass rate is below this threshold (0.0-1.0)'
        required: false
        default: '0.0'
        type: string

  # Run automatically after every push to the default branch so that
  # scaffolding quality is tracked over time as the codebase evolves.
  push:
    branches: [main]
    paths:
      # Only re-evaluate when the scaffolding or source changes
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'system_prompt.md'
      - 'agent-context.json'
      - 'src/**'

jobs:
  eval:
    permissions:
      contents: read
    uses: vb-nattamai/agent-ready/.github/workflows/reusable-eval.yml@main
    with:
      target_repo: ${{ github.repository }}
      provider: anthropic
      fail_level: ${{ inputs.fail_level || '0.0' }}
    secrets: inherit
